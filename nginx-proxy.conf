server {
    listen 80;
    server_name artsays.in www.artsays.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name artsays.in www.artsays.in;

    ssl_certificate     /etc/letsencrypt/live/artsays.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artsays.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://artsays-frontend-container:80;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
    }
}
