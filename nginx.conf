server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Sitemap & Robots → backend ──────────────────────────────────────────
    location = /sitemap.xml {
        proxy_pass http://artsays-backend-container:3001/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        proxy_pass http://artsays-backend-container:3001/robots.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API requests → backend ───────────────────────────────────────────────
    location /api/ {
        proxy_pass http://artsays-backend-container:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Serve index.html directly (used by backend to fetch the template) ────
    # IMPORTANT: This must NOT proxy to backend to avoid infinite loops.
    location = /index.html {
        gzip off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /index.html =404;
    }

    # ── Static assets served directly by nginx (fast, no backend needed) ────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map|webp|avif)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── All HTML page requests → backend prerender (SSR meta injection) ──────
    #
    # This is the key change: instead of serving index.html directly (which
    # would have bare __META_* placeholders), we proxy page requests to the
    # backend. The backend reads index.html, replaces all __META_* tokens with
    # real data from the database, and returns fully-formed HTML so that
    # "View Page Source" shows correct meta tags for SEO and social sharing.
    location / {
        proxy_pass http://artsays-backend-container:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Ensure browsers never cache the HTML page (which embeds hashed JS/CSS filenames).
        # Caching index.html causes ERR_ABORTED 404 for old JS bundle hashes after a redeploy.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # Fallback: if backend is down or errors, serve the raw index.html
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /index.html;
    }

    client_max_body_size 50M;
}