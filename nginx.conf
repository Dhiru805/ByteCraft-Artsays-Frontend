server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS resolver — defers backend DNS lookup to request time
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Health check — answered by nginx directly, no backend involved
    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Sitemap → backend
    location = /sitemap.xml {
        set $backend artsays-backend-container:3001;
        proxy_pass http://$backend/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Robots → backend
    location = /robots.txt {
        set $backend artsays-backend-container:3001;
        proxy_pass http://$backend/robots.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API requests → backend
    location /api/ {
        set $backend artsays-backend-container:3001;
        proxy_pass http://$backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets served directly by nginx
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map|webp|avif)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # All other requests → backend (SSR / meta injection)
    # Falls back to index.html if backend is unreachable
    location / {
        set $backend artsays-backend-container:3001;
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        proxy_intercept_errors on;
        error_page 500 502 503 504 = /index.html;
    }

    client_max_body_size 50M;
}
