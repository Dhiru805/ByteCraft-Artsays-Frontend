  <!-- Initialize dashboard theme & font from localStorage BEFORE React mounts
       to prevent flash of unstyled/unthemed content on first load -->
  <script>
    (function () {
      try {
        var color = localStorage.getItem('selectedColor') || 'cyan';
        var font = localStorage.getItem('selectedFont') || 'poppins';
        var theme = localStorage.getItem('theme') || 'light';
        // Set font class on body immediately
        document.body.className = font;
        // Set theme attribute immediately
        document.documentElement.setAttribute('data-theme', theme);
        document.body.setAttribute('data-theme', theme);
        // Store color so React can read it without a layout effect delay
        window.__DASHBOARD_COLOR__ = color;
      } catch (e) { /* localStorage unavailable in private mode */ }
    })();
  </script>
